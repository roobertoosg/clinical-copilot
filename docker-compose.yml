version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: copilot_postgres
    restart: always
    environment:
      POSTGRES_USER: copilot_user
      POSTGRES_PASSWORD: copilot_password
      POSTGRES_DB: copilot_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: copilot_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
